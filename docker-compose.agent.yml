services:
  studyos-agent-gateway:
    build:
      context: .
      dockerfile: Dockerfile.agent
    env_file:
      - .env
    environment:
      CODEX_HOME: /auth/codex
      GH_CONFIG_DIR: /auth/gh
    volumes:
      - codex-auth:/auth/codex
      - gh-auth:/auth/gh
      - agent-workspaces:/workspaces
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  codex-auth:
  gh-auth:
  agent-workspaces:
