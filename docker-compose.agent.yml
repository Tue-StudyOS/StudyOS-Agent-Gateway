services:
  studyos-agent-gateway:
    build:
      context: .
      dockerfile: Dockerfile.agent
    env_file:
      - .env
    environment:
      CODEX_HOME: /auth/codex
      GH_CONFIG_DIR: /auth/gh
      GH_PUBLIC_CONFIG_DIR: /auth/gh-public
      GH_STUDYOS_ORG_CONFIG_DIR: /auth/gh-studyos-org
    volumes:
      - codex-auth:/auth/codex
      - gh-auth:/auth/gh
      - gh-public-auth:/auth/gh-public
      - gh-studyos-org-auth:/auth/gh-studyos-org
      - agent-workspaces:/workspaces
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  codex-auth:
  gh-auth:
  gh-public-auth:
  gh-studyos-org-auth:
  agent-workspaces:
