version = 1
id = "studyos-group-channel-digest"
kind = "cron"
name = "StudyOS group channel digest"
prompt = """
Summarize active StudyOS Discord group channels into one concise shared channel
digest. Do not require humans to configure channel IDs.

Configuration lives in this automation TOML under [config]. Discover channels
from Discord on every run by listing accessible guilds and channels, then infer
which channels are group project channels from names, categories, and the
patterns below. Channel IDs may be stored only as runtime state in
last_processed_message_ids after a successful digest.

Workflow:
- Read this TOML from $CODEX_HOME/automations/studyos-group-channel-digest/automation.toml.
- Require DISCORD_TOKEN. Never print or store the token.
- Call the Discord REST API directly:
  - GET /users/@me/guilds to list accessible guilds.
  - GET /guilds/{guild_id}/channels for each accessible guild.
- Prefer guilds whose names match guild_name_hints. If no hint matches, inspect
  all accessible guilds and continue only when the StudyOS course/server can be
  identified confidently from guild, category, or channel names.
- Build a channel inventory with guild name, category name, channel name, type,
  and ID. Consider only text channels that the bot can read.
- Identify source group channels by matching group_channel_name_patterns against
  channel names or category names, then remove channels matching
  excluded_channel_name_patterns.
- Identify the destination channel by exact or normalized name match against
  destination_channel_name_candidates. The intended destination is the StudyOS
  #updates channel. If no single destination is found, do not post; report the
  likely candidate channels in the automation output.
- For each discovered source channel, fetch messages with
  GET /channels/{channel_id}/messages?limit=100 when no last message ID exists,
  or GET /channels/{channel_id}/messages?after={last_message_id}&limit=100 when
  last_processed_message_ids has a value for that channel.
- Ignore bot messages unless they contain necessary context for a human request.
- Summarize only meaningful human discussion.

Digest shape:
- Group by source channel name.
- Include decisions or emerging project direction.
- Include blockers or open questions.
- Include requests that would benefit from an issue, PR, or agent follow-up.
- Include cross-group context useful to the wider StudyOS course.

Safety and noise rules:
- Do not include secrets, credentials, private personal data, or long quotes.
- Do not mention individual students unless the source discussion clearly needs
  a named owner or reviewer.
- If there is no meaningful new group activity, do not post a digest.
- Never create issues, branches, pull requests, or merge pull requests.

Post one concise digest only after exactly one destination channel and at least
one source group channel are discovered. After a successful post, update
last_processed_message_ids in this TOML to the newest fetched message ID per
source channel. Preserve all other fields. If posting fails, report the failure
in the automation output and do not advance last_processed_message_ids.
"""
status = "PAUSED"
rrule = "RRULE:FREQ=DAILY;BYHOUR=17;BYMINUTE=0"
model = "gpt-5.5"
reasoning_effort = "medium"
execution_environment = "local"
cwds = ["/workspaces"]

[config]
guild_name_hints = ["StudyOS", "ML-4510", "Practical Machine Learning"]
destination_channel_name_candidates = [
  "updates",
]
group_channel_name_patterns = [
  "group",
  "team",
  "project",
]
excluded_channel_name_patterns = [
  "admin",
  "bot",
  "log",
  "archive",
  "announcement",
  "digest",
]
last_processed_message_ids = {}
